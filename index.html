<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITLG : ITL Ratio Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>ITLG to ITL Ratio Calculator</h2>

    <div class="input-group">
        <label>Available ITLG</label>
        <input type="number" id="coins" placeholder="Enter Available ITLG Coins">
    </div>

    <div class="input-group">
        <label>Locking Years</label>
        <select id="year">
            <option value="0">0 Year</option>
            <option value="1">1 Year</option>
            <option value="2">2 Years</option>
            <option value="3">3 Years</option>
            <option value="4">4 Years</option>
            <option value="5">5 Years</option>
        </select>
    </div>

    <div class="input-group">
        <label>Vesting Months</label>
        <select id="months">
            <option value="0">0</option>
            <option value="12">12</option>
            <option value="24">24</option>
            <option value="36">36</option>
            <option value="48">48</option>
            <option value="60">60</option>
            <option value="72">72</option>
            <option value="84">84</option>
            <option value="96">96</option>
            <option value="108">108</option>
            <option value="120">120</option>
        </select>
    </div>

    <button onclick="calculate()">Calculate Now</button>

    <div class="result" id="result">
        <p>You will get <strong>Ratio:</strong> 1 : <span id="ratio"></span></p>
        <p>You will get <strong>Monthly ITL Coins:</strong> <span id="monthly"></span></p>
        <p>You will get <strong>Total ITL Coins:</strong> <span id="total"></span></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
