<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITLG → ITL Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo-section">
        <img src="interlink-logo.png" alt="InterLink Logo">
        <h1>ITLG : ITL Coins Calculator</h1>
    </div>

    <div class="card">

        <label>Available ITLG Coins</label>
        <input type="number" id="itlg" placeholder="Enter ITLG Coins">

        <label>Locking Years</label>
        <select id="locking">
            <option value="0">0 Year</option>
            <option value="1">1 Year</option>
            <option value="2">2 Years</option>
            <option value="3">3 Years</option>
            <option value="4">4 Years</option>
            <option value="5">5 Years</option>
        </select>

        <label>Vesting Months</label>
        <select id="vesting">
            <option value="0">0</option>
            <option value="12">12</option>
            <option value="24">24</option>
            <option value="36">36</option>
            <option value="48">48</option>
            <option value="60">60</option>
            <option value="72">72</option>
            <option value="84">84</option>
            <option value="96">96</option>
            <option value="108">108</option>
            <option value="120">120</option>
        </select>

        <button onclick="calculate()">Calculate</button>

        <div class="result">
            <h3 id="status"></h3>

            <p><strong>Ratio:</strong> <span id="ratio">-</span></p>
            <p><strong>Total ITL Coins:</strong> <span id="total">-</span></p>
            <p><strong>Monthly ITL Coins:</strong> <span id="monthly">-</span></p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
